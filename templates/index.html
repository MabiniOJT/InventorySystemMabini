<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GSO Inventory System</title>
    <script>
        (function () {
            var savedTheme = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme = savedTheme || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #4CAF50 0%, #2196F3 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .theme-toggle-login { position: fixed; top: 16px; right: 16px; width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.15); color: #fff; font-size: 18px; line-height: 1; cursor: pointer; backdrop-filter: blur(6px); }
        .theme-toggle-login:hover { background: rgba(255,255,255,0.22); }
        .login-container { width: 100%; max-width: 450px; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .login-box { background: #ffffff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); padding: 40px; }
        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px; display: block; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2); object-fit: cover; border: 3px solid white; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #333; font-size: 28px; font-weight: 700; margin-bottom: 10px; }
        .login-header p { color: #666; font-size: 14px; font-weight: 400; }
        .alert { padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .alert-error { background-color: #fee; border: 1px solid #fcc; color: #c33; }
        .alert-success { background-color: #efe; border: 1px solid #cfc; color: #3c3; }
        .login-form { margin-top: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-size: 14px; font-weight: 500; }
        .form-group input[type="email"], .form-group input[type="password"] { width: 100%; padding: 12px 15px; border: 2px solid #e1e8ed; border-radius: 10px; font-size: 14px; font-family: 'Poppins', sans-serif; transition: all 0.3s ease; background-color: #f8f9fa; }
        .form-group input[type="email"]:focus, .form-group input[type="password"]:focus { outline: none; border-color: #2196F3; background-color: #fff; box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1); }
        .checkbox-group { margin: 15px 0; }
        .checkbox-label { display: flex; align-items: center; cursor: pointer; font-size: 14px; color: #666; }
        .checkbox-label input[type="checkbox"] { width: 18px; height: 18px; margin-right: 8px; cursor: pointer; accent-color: #4CAF50; }
        .checkbox-label span { user-select: none; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #4CAF50 0%, #2196F3 100%); color: #ffffff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4); }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6); }
        .btn-login:active { transform: translateY(0); }
        .form-footer { text-align: center; margin-top: 20px; }
        .forgot-password { color: #2196F3; text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.3s ease; }
        .forgot-password:hover { color: #4CAF50; text-decoration: underline; }
        [data-theme="dark"] body { background: linear-gradient(135deg, #11314a 0%, #16293f 100%); }
        [data-theme="dark"] .login-box { background: #18222d; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55); }
        [data-theme="dark"] .login-header h1 { color: #e4edf6; }
        [data-theme="dark"] .login-header p { color: #b7c6d6; }
        [data-theme="dark"] .form-group label { color: #d6e2ee; }
        [data-theme="dark"] .form-group input[type="email"],
        [data-theme="dark"] .form-group input[type="password"] { background-color: #233140; border-color: #314456; color: #e4edf6; }
        [data-theme="dark"] .form-group input[type="email"]:focus,
        [data-theme="dark"] .form-group input[type="password"]:focus { background-color: #18222d; }
        [data-theme="dark"] .checkbox-label { color: #b7c6d6; }
        [data-theme="dark"] .forgot-password { color: #7db9f2; }
        [data-theme="dark"] .forgot-password:hover { color: #8ad8a0; }
        [data-theme="dark"] .theme-toggle-login { border-color: rgba(154, 186, 215, 0.35); background: rgba(10, 22, 34, 0.55); }
        [data-theme="dark"] .theme-toggle-login:hover { background: rgba(12, 29, 44, 0.75); }
        @media (max-width: 480px) { .login-box { padding: 30px 25px; } .login-header h1 { font-size: 24px; } .btn-login { padding: 12px; font-size: 15px; } }
    </style>
</head>
<body>
    <button id="theme-toggle-login" class="theme-toggle-login" type="button" aria-label="Toggle theme" title="Toggle theme">🌙</button>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="GSO Logo" class="logo">
            </div>
            
            <div class="login-header">
                <h1>GSO Inventory System</h1>
                <p>Please login to your account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                <div class="alert alert-{{ 'success' if cat == 'success' else 'error' }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login_process') }}" class="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" value="{{ session.pop('old_email', '') }}" required autofocus placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" id="remember">
                        <span>Remember Me</span>
                    </label>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-login">Login</button>
                </div>

                <div class="form-footer">
                    <a href="#" class="forgot-password">Forgot Your Password?</a>
                </div>
            </form>

            <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; font-size: 12px; color: #666;">
                <strong>Demo Account:</strong><br>
                • Admin: admin@mabini.com / password
            </div>
        </div>
    </div>

    <script>
        (function () {
            var toggle = document.getElementById('theme-toggle-login');
            if (!toggle) return;

            function syncIcon() {
                var current = document.documentElement.getAttribute('data-theme') || 'light';
                toggle.textContent = current === 'dark' ? '☀' : '🌙';
                toggle.setAttribute('title', current === 'dark' ? 'Light mode' : 'Dark mode');
                toggle.setAttribute('aria-label', current === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
            }

            toggle.addEventListener('click', function () {
                var current = document.documentElement.getAttribute('data-theme') || 'light';
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                syncIcon();
            });

            syncIcon();
        })();
    </script>
</body>
</html>
